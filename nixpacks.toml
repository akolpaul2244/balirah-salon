[phases.setup]
nixPkgs = ["python311", "postgresql_16"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "mkdir -p logs",
    "python manage.py collectstatic --noinput",
    "python manage.py migrate --noinput",
]

[start]
cmd = "gunicorn balirah_salon.wsgi:application --config gunicorn.conf.py"