{% extends "base.html" %}
{% load static %}

{% block title %}Resend Verification Email{% endblock %}

{% block content %}

<section class="section section--cream" style="min-height:calc(100vh - var(--nav-height));display:flex;align-items:center">
  <div class="container" style="max-width:480px">
    <div class="form-card" data-aos="zoom-in">
      <div style="text-align:center;margin-bottom:2rem">
        <div class="status-card__icon" style="background:rgba(212,175,55,.1)">
          <i class="fas fa-envelope" style="color:var(--gold)"></i>
        </div>
        <h1 style="font-size:1.5rem;margin-bottom:.5rem">Resend Verification Email</h1>
        <p style="color:var(--grey-600);font-size:.9375rem">Enter your email address and we'll send a new verification link.</p>
      </div>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_email">Email Address</label>
          <input type="email" id="id_email" name="email" class="form-control" required autocomplete="email" autofocus>
        </div>
        <button type="submit" class="btn btn--primary btn--full btn--lg">
          <i class="fas fa-paper-plane"></i> Send Verification Link
        </button>
      </form>

      <p style="text-align:center;font-size:.875rem;color:var(--grey-400);margin-top:1.5rem">
        <a href="{% url 'accounts:login' %}" style="color:var(--gold)">Back to sign in</a>
      </p>
    </div>
  </div>
</section>

{% endblock %}
