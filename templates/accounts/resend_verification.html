{% extends "base.html" %}
{% load static %}

{% block title %}Resend Verification Email{% endblock %}

{% block content %}

<section class="section section--alt auth-standalone">
  <div class="container auth-standalone__container">
    <div class="form-card">
      <div class="auth-standalone__header">
        <div class="status-card__icon status-card__icon--gold">
          <i class="fas fa-envelope"></i>
        </div>
        <h1 class="auth-standalone__title">Resend Verification Email</h1>
        <p class="auth-standalone__text">Enter your email address and we'll send a new verification link.</p>
      </div>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_email">Email Address</label>
          <input type="email" id="id_email" name="email" class="form-control" required autocomplete="email" inputmode="email" autofocus>
        </div>
        <button type="submit" class="btn btn--primary btn--full btn--lg">
          <i class="fas fa-paper-plane"></i> Send Verification Link
        </button>
      </form>

      <p class="hint-text hint-text--center">
        <a href="{% url 'accounts:login' %}" class="text-gold">Back to sign in</a>
      </p>
    </div>
  </div>
</section>

{% endblock %}
