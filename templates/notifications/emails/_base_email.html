{% load static %}
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>{% block title %}{{ salon_name }}{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
  </noscript>
  <![endif]-->
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; }
    @media only screen and (max-width: 600px) {
      .email-wrapper  { padding: 16px 8px !important; }
      .email-card     { border-radius: 8px !important; }
      .email-body     { padding: 28px 24px !important; }
      .email-header   { padding: 24px !important; }
      .email-footer   { padding: 20px 24px !important; }
      .btn-primary    { padding: 13px 28px !important; font-size: 14px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#F5F2EC;font-family:Helvetica,Arial,sans-serif;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
         style="background-color:#F5F2EC;">
    <tr>
      <td class="email-wrapper" align="center" style="padding:40px 16px;">

        <!-- Card -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
               class="email-card"
               style="max-width:560px;background-color:#FFFFFF;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td class="email-header"
                style="background-color:#1A1208;padding:32px 40px;text-align:center;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;color:#FFFFFF;letter-spacing:-0.01em;">
                Balirah<span style="color:#C9A84C;"> Beauty Salon</span>
              </span>
              <p style="margin:6px 0 0;font-family:Helvetica,Arial,sans-serif;font-size:11px;
                         color:rgba(201,168,76,0.65);letter-spacing:0.15em;text-transform:uppercase;">
                Kampala, Uganda
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="email-body" style="padding:40px;">
              {% block email_content %}{% endblock %}
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background-color:#F4F1EC;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="email-footer"
                style="background-color:#1A1208;padding:24px 40px;text-align:center;">
              <p style="margin:0 0 6px;font-size:12px;color:rgba(212,200,154,0.55);font-family:Helvetica,Arial,sans-serif;line-height:1.6;">
                {{ salon_name }} &middot; Kampala, Uganda
              </p>
              <p style="margin:0;font-size:11px;color:rgba(212,200,154,0.3);font-family:Helvetica,Arial,sans-serif;line-height:1.6;">
                You received this email because you have an account or appointment with us.
              </p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>
  <!-- /Outer wrapper -->

</body>
</html>
