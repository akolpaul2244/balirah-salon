{% extends "base.html" %}
{% load static %}

{% block title %}Bad Request{% endblock %}

{% block content %}

<div class="error-page">
  <div class="error-page__inner">
    <div class="error-page__code">400</div>
    <div class="error-page__content">
      <i class="fas fa-exclamation-triangle error-page__icon"></i>
      <h1 class="error-page__title">Bad Request</h1>
      <p class="error-page__text">We couldn't process your request. Please check the details and try again.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="{% url 'core:home' %}" class="btn btn--primary">
          <i class="fas fa-home"></i> Back to Home
        </a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
