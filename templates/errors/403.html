{% extends "base.html" %}
{% load static %}

{% block title %}Access Denied{% endblock %}

{% block content %}

<div class="error-page">
  <div class="error-page__inner">
    <div class="error-page__code">403</div>
    <div class="error-page__content">
      <i class="fas fa-lock error-page__icon"></i>
      <h1 class="error-page__title">Access Denied</h1>
      <p class="error-page__text">You don't have permission to view this page. If you believe this is an error, please contact us.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
        <a href="{% url 'core:home' %}" class="btn btn--primary">
          <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="{% url 'accounts:login' %}" class="btn btn--outline">Sign In</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
