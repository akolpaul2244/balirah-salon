services:
  - type: web
    name: balirah-salon
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn balirah_salon.wsgi:application --config gunicorn.conf.py
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: balirah_salon.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: balirah-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: balirah-redis
          type: redis
          property: connectionString

  - type: worker
    name: balirah-celery-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A balirah_salon worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: balirah_salon.settings.production

  - type: worker
    name: balirah-celery-beat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A balirah_salon beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: balirah_salon.settings.production

databases:
  - name: balirah-db
    databaseName: balirah_salon
    user: balirah

services:
  - type: redis
    name: balirah-redis
    plan: free
